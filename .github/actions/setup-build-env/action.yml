name: Setup build environment
description: Set up JDK 21 + sbt for Scala builds
# Assumes the caller has already run actions/checkout — local composite actions are resolved
# against the checked-out workspace, so checkout can't live inside this action (chicken-and-egg).

runs:
  using: composite
  steps:
    - name: Setup JDK
      uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5.5.0
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: sbt
    - name: Setup SBT
      uses: sbt/setup-sbt@12b8b25f7dab04860144e2dd48dc141b485192f7 # v1.5.0
