name: Setup build environment
description: Set up JDK 21 + sbt for Scala builds
# Assumes the caller has already run actions/checkout — local composite actions are resolved
# against the checked-out workspace, so checkout can't live inside this action (chicken-and-egg).

runs:
  using: composite
  steps:
    - name: Setup JDK
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: sbt
    - name: Setup SBT
      uses: sbt/setup-sbt@6444f4c8111de4b9059c3975def104b03cfaa5f0 # v1.5.2
