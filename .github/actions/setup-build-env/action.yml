name: Setup build environment
description: Set up JDK 21 + sbt for Scala builds
# Assumes the caller has already run actions/checkout — local composite actions are resolved
# against the checked-out workspace, so checkout can't live inside this action (chicken-and-egg).

runs:
  using: composite
  steps:
    - name: Setup JDK
      uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5.6.0
      with:
        distribution: 'zulu'
        java-version: '21'
        cache: sbt
    - name: Setup SBT
      uses: sbt/setup-sbt@9d56cf12e9b58d219605e1d8bfe69a8395fedde0 # v1.5.1
