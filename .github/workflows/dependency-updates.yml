name: Dependency Updates

on:
  schedule:
    - cron: '0 8 * * 1'  # every Monday at 08:00 UTC
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:

    runs-on: ubuntu-24.04
    timeout-minutes: 10

    env:
      SBT_OPTS: "-Xmx2g"

    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
      - name: Report library dependency updates
        run: |
          {
            echo '## Library dependencies'
            echo '```'
            sbt -no-colors xdup
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Report SBT plugin updates
        run: |
          {
            echo '## SBT plugins'
            echo '```'
            python3 .claude/skills/bump-versions/scripts/check_plugin_updates.py
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Report SBT / scalafmt formatter versions
        # Not covered by `sbt xdup` (that's the main build's dependencies only) or by Dependabot's
        # "sbt" ecosystem entry, as far as could be confirmed — these two need a direct GitHub
        # releases check, same as the bump-versions skill's Step 2.
        run: |
          {
            echo '## SBT itself'
            echo '```'
            echo "current: $(grep sbt.version project/build.properties)"
            echo "latest:  $(curl -s https://api.github.com/repos/sbt/sbt/releases/latest | python3 -c 'import sys,json; print(json.load(sys.stdin)["tag_name"])')"
            echo '```'
            echo '## scalafmt formatter'
            echo '```'
            echo "current: $(grep '^version' .scalafmt.conf)"
            echo "latest:  $(curl -s https://api.github.com/repos/scalameta/scalafmt/releases/latest | python3 -c 'import sys,json; print(json.load(sys.stdin)["tag_name"])')"
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
      - name: Report GitHub Actions updates
        run: |
          {
            echo '## GitHub Actions'
            echo '```'
            python3 .claude/skills/bump-versions/scripts/check_actions_updates.py
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"
