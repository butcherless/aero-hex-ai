name: Scala CI

on:
  push:
    branches:
      - 'main'
  pull_request:
    types: [ opened, synchronize, reopened ]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:

    runs-on: ubuntu-24.04
    timeout-minutes: 10

    env:
      SBT_OPTS: "-Xmx2g"

    # services:
    #   postgres:
    #     image: postgres:16-alpine
    #     env:
    #       POSTGRES_USER: aviation
    #       POSTGRES_PASSWORD: aviation
    #       POSTGRES_DB: aviation
    #     ports:
    #       - 5432:5432
    #     options: >-
    #       --health-cmd pg_isready
    #       --health-interval 10s
    #       --health-timeout 5s
    #       --health-retries 5
    #
    #   kafka:
    #     image: confluentinc/cp-kafka:8.3.0
    #     env:
    #       KAFKA_NODE_ID: 1
    #       KAFKA_PROCESS_ROLES: broker,controller
    #       KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
    #       KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
    #       KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
    #       KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
    #       KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
    #       KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    #       KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
    #       KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    #       KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    #       CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    #     ports:
    #       - 9092:9092
    #     options: >-
    #       --health-cmd "kafka-topics --bootstrap-server localhost:9092 --list"
    #       --health-interval 15s
    #       --health-timeout 10s
    #       --health-retries 10
    #       --health-start-period 30s

    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Setup build environment
        uses: ./.github/actions/setup-build-env
      - name: Check formatting
        run: sbt scalafmtCheckAll
      - name: Compile and unit tests
        run: |
          sbt compile
          # Scala 3 coverage Invoker needs scoverage-data/ per module; absent on CAS hits
          mkdir -p \
            shared-kernel/.coverage-data/scoverage-data \
            domain/.coverage-data/scoverage-data \
            application/.coverage-data/scoverage-data \
            infrastructure/persistence-postgres/.coverage-data/scoverage-data \
            infrastructure/persistence-quill/.coverage-data/scoverage-data \
            infrastructure/messaging-kafka/.coverage-data/scoverage-data \
            infrastructure/migration/.coverage-data/scoverage-data \
            adapter-http/.coverage-data/scoverage-data \
            bootstrap/.coverage-data/scoverage-data
          sbt "testOnly *"
      - name: Coverage report
        run: sbt coverageAggregate
      - name: Assembly
        run: sbt "bootstrap/assembly"
