    steps:
      - uses: actions/checkout@v7
      - name: Setup JDK
        uses: actions/setup-java@v5
        with:
          distribution: 'zulu'
          java-version: '21'
          cache: sbt
      - uses: sbt/setup-sbt@v1
      - name: check formatting
        run: sbt scalafmtCheckAll
      - name: compile and unit tests
        run: sbt "compile; testOnly *"
      - name: integration tests
        run: echo "TODO"
      - name: assembly
        run: sbt "bootstrap/assembly"
        env:
          SBT_OPTS: "-Xmx2g"
      - name: dependency updates report
        run: sbt dependencyUpdates
