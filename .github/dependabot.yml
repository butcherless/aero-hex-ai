# To get started with Dependabot version updates, you'll need to specify which
# package ecosystems to update and where the package manifests are located.
# Please see the documentation for all configuration options:
# https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file

version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"

  - package-ecosystem: "sbt"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    ignore:
      # Major bumps need migration-guide review (CLAUDE.md versioning policy) — keep them manual.
      - dependency-name: "*"
        update-types: [ "version-update:semver-major" ]
      # Doobie is pinned deliberately (no GA release yet) — don't auto-chase newer RCs.
      - dependency-name: "org.tpolecat:doobie-*"

  - package-ecosystem: "docker-compose"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
